root = "."
tmp_dir = "tmp"
[build]
  cmd = "go build -o ./tmp/main ./cmd/server/"
  bin = "./tmp/main"
  full_bin = "./tmp/main -env .env.local"
  include_ext = ["go", "tpl", "tmpl", "html"]
  exclude_dir = ["tmp", "vendor", "web"]
  delay = 1000
  kill_delay = "0s"
  rerun = false
  rerun_delay = 500

[log]
  time = false

[misc]
  clean_on_exit = true
