version: "2"
sql:
  - engine: "postgresql"
    queries: "sql/queries/"
    schema:
      - "migrations/000001_gtd.up.sql"
      - "migrations/000002_workspace.up.sql"
      - "migrations/000003_decisions.up.sql"
      - "migrations/000004_sessions.up.sql"
      - "migrations/000005_knowledge.up.sql"
      - "migrations/000006_learning.up.sql"
      - "migrations/000007_knowledge_source.up.sql"
      - "migrations/000008_add_workspace_id.up.sql"
      - "migrations/000009_task_importance_context.up.sql"
      - "migrations/000010_pending_proposals.up.sql"
      - "migrations/000012_concept_status.up.sql"
    gen:
      go:
        package: "db"
        out: "internal/db"
        emit_json_tags: true
        emit_interface: true
        emit_exact_table_names: false
        sql_package: "pgx/v5"
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "pg_catalog.timestamptz"
            nullable: false
            go_type: "time.Time"
          - db_type: "pg_catalog.timestamptz"
            nullable: true
            go_type:
              import: "database/sql"
              type: "NullTime"
          - db_type: "vector"
            go_type: "string"
