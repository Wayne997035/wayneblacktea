version: "2"
run:
  go: "1.26.1"
  timeout: 5m

formatters:
  enable:
    - gofmt
    - goimports

linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
    - misspell
    - gocritic
    - gosec
    - bodyclose
    - nilnil
    - wrapcheck
    - lll
    - gocyclo

linters-settings:
  lll:
    line-length: 140
  gocyclo:
    min-complexity: 15
  gosec:
    excludes: []

issues:
  exclude-rules:
    - path: "_test.go"
      linters:
        - wrapcheck
