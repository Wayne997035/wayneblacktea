version: "2"

run:
  go: "1.26.1"
  timeout: 5m
  modules-download-mode: readonly

formatters:
  enable:
    - gofmt
    - goimports
    - gofumpt # stricter gofmt: no extra blank lines, canonical import grouping

linters:
  enable:
    # Static analysis
    - govet
    - staticcheck
    - ineffassign
    - unused
    # Errors
    - errcheck
    - wrapcheck
    # Quality
    - misspell
    - gocyclo
    - dupl       # detects copy-paste code duplication
    - goconst    # repeated string constants should be named
    - bodyclose
    # Style
    - gocritic
    - lll
    - noctx      # no context.Background/TODO in http handler path
    - nilnil
    # Security
    - gosec
    # Completeness
    - exhaustive # switch on enum must cover all cases (or have default)
    # Audit integrity
    - nolintlint # every //nolint must name the linter + have a reason
    # Context propagation
    - contextcheck # context must flow through call chain, not Background mid-stack

  settings:
    wrapcheck:
      extra-ignore-sigs:
        - "github.com/labstack/echo/v4.Context).JSON("
        - "github.com/labstack/echo/v4.Context).String("
        - "github.com/labstack/echo/v4.Context).NoContent("
    lll:
      line-length: 140
    gocyclo:
      min-complexity: 15
    dupl:
      threshold: 150
    goconst:
      min-len: 3
      min-occurrences: 3
    exhaustive:
      default-signifies-exhaustive: true
    nolintlint:
      require-explanation: true  # //nolint:lintername // reason: ... is required
      require-specific: true     # //nolint (no linter name) is rejected
    gosec:
      excludes:
        - G703 # seed CLI uses user-controlled PROJECT_ROOT intentionally
        - G706 # slog structured logging is not vulnerable to log injection
    errcheck:
      exclude-functions:
        - fmt.Fprintf
        - fmt.Fprintln
        - (io.Closer).Close

  exclusions:
    paths:
      - web/node_modules
    rules:
      - path: "_test.go"
        linters:
          - wrapcheck
          - dupl       # test helpers are intentionally repetitive
          - contextcheck # test setup often uses context.Background() legitimately
          - nilnil     # test stubs legitimately return (nil, nil) for unexercised methods

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
