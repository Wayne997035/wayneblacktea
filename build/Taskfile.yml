version: '3'

vars:
  BINARY_NAME: wayneblacktea-mcp
  BINARY_OUT: bin/{{.BINARY_NAME}}
  GO_BUILD_CACHE: "{{.TASKFILE_DIR}}/../tmp/go-build"

env:
  GOCACHE: "{{.GO_BUILD_CACHE}}"

tasks:
  default:
    cmds:
      - task: check

  check:
    desc: "Full quality gate — run before any commit"
    cmds:
      - task: lint
      - task: test
      - task: build-mcp
      - task: build-server
      - task: build-doctor
    silent: false

  build-mcp:
    desc: "Build MCP binary to bin/"
    deps:
      - go-cache
    cmds:
      - mkdir -p bin
      - go build -o {{.BINARY_OUT}} ./cmd/mcp/
    dir: ..

  build-server:
    desc: "Build REST API server binary to bin/"
    deps:
      - go-cache
    cmds:
      - mkdir -p bin
      - go build -o bin/wayneblacktea-server ./cmd/server/
    dir: ..

  build-doctor:
    desc: "Build the wbt-doctor health snapshot binary used by the Stop hook"
    deps:
      - go-cache
    cmds:
      - mkdir -p bin
      - go build -o bin/wbt-doctor ./cmd/doctor/
    dir: ..

  lint:
    desc: "Run golangci-lint"
    deps:
      - go-cache
    cmds:
      - |
        if [ "${CODEX_SANDBOX_NETWORK_DISABLED:-}" = "1" ]; then
          GOPROXY=off golangci-lint run --config build/.golangci.yml ./...
        else
          golangci-lint run --config build/.golangci.yml ./...
        fi
    dir: ..

  test:
    desc: "Run unit tests"
    deps:
      - go-cache
    cmds:
      - go test -race ./internal/... ./cmd/...
    dir: ..

  go-cache:
    desc: "Create workspace-local Go build cache for sandboxed agent runs"
    cmds:
      - mkdir -p {{.GO_BUILD_CACHE}}
    dir: ..

  test-integration:
    desc: "Run integration tests (requires DATABASE_URL)"
    cmds:
      - go test -race -tags integration ./...
    dir: ..

  migrate-up:
    desc: "Apply DB migrations (requires .env.local with DATABASE_URL)"
    dotenv: ['../.env.local']
    preconditions:
      - sh: test -n "{{.DATABASE_URL}}"
        msg: "DATABASE_URL is not set — add it to .env"
    cmds:
      - migrate -path migrations/ -database "{{.DATABASE_URL}}" up
    dir: ..

  migrate-down:
    desc: "Roll back last DB migration (requires .env.local with DATABASE_URL)"
    dotenv: ['../.env.local']
    preconditions:
      - sh: test -n "{{.DATABASE_URL}}"
        msg: "DATABASE_URL is not set — add it to .env"
    cmds:
      - migrate -path migrations/ -database "{{.DATABASE_URL}}" down 1
    dir: ..

  sqlc:
    desc: "Regenerate sqlc code"
    cmds:
      - sqlc generate
    dir: ..

  clean:
    desc: "Remove build artifacts"
    cmds:
      - rm -rf bin/
    dir: ..
