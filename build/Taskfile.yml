version: '3'

vars:
  BINARY_NAME: wayneblacktea-mcp
  BINARY_OUT: ../bin/{{.BINARY_NAME}}

tasks:
  default:
    cmds:
      - task: check

  check:
    desc: "Full quality gate — run before any commit"
    cmds:
      - task: lint
      - task: test
      - task: build-mcp
    silent: false

  build-mcp:
    desc: "Build MCP binary to bin/"
    cmds:
      - mkdir -p ../bin
      - go build -o {{.BINARY_OUT}} ../cmd/mcp/
    dir: ..

  lint:
    desc: "Run golangci-lint"
    cmds:
      - golangci-lint run --config build/.golangci.yml ./...
    dir: ..

  test:
    desc: "Run unit tests"
    cmds:
      - go test -race ./...
    dir: ..

  test-integration:
    desc: "Run integration tests (requires DATABASE_URL)"
    cmds:
      - go test -race -tags integration ./...
    dir: ..

  migrate-up:
    desc: "Apply DB migrations (requires .env.local with DATABASE_URL)"
    dotenv: ['../.env.local']
    preconditions:
      - sh: test -n "{{.DATABASE_URL}}"
        msg: "DATABASE_URL is not set — add it to .env"
    cmds:
      - migrate -path migrations/ -database "{{.DATABASE_URL}}" up
    dir: ..

  migrate-down:
    desc: "Roll back last DB migration (requires .env.local with DATABASE_URL)"
    dotenv: ['../.env.local']
    preconditions:
      - sh: test -n "{{.DATABASE_URL}}"
        msg: "DATABASE_URL is not set — add it to .env"
    cmds:
      - migrate -path migrations/ -database "{{.DATABASE_URL}}" down 1
    dir: ..

  sqlc:
    desc: "Regenerate sqlc code"
    cmds:
      - sqlc generate
    dir: ..

  clean:
    desc: "Remove build artifacts"
    cmds:
      - rm -rf ../bin/
