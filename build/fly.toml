app = "wayneblacktea-server"
primary_region = "hkg"

[build]
  dockerfile = "build/Dockerfile.server"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[env]
  PORT = "8080"
  # Secrets (set via `fly secrets set`, never commit values):
  # DATABASE_URL=...
  # API_KEY=...

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
