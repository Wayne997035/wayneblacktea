<?xml version="1.0" encoding="UTF-8"?>
<!--
  Placeholder logo for wayneblacktea. Implements the chosen direction:
  a line-drawn teacup with a teabag tag hanging over the rim, the tag
  carrying the wordmark. Deliberately rough so it cannot be mistaken
  for the final deliverable described in docs/logo-brief.md.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320" role="img" aria-label="wayneblacktea (placeholder logo)">
  <title>wayneblacktea (placeholder)</title>

  <!-- background: paper -->
  <rect width="320" height="320" fill="#FAF6EE"/>

  <!-- steam ribbons rising from the cup -->
  <g fill="none" stroke="#8C2A1A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.85">
    <path d="M120 70 q8 -16 16 -8 q8 8 16 -8 q8 -16 16 -4"/>
    <path d="M150 50 q8 -14 16 -6 q8 8 14 -8" opacity="0.55"/>
  </g>

  <!-- teacup outline -->
  <g fill="none" stroke="#8C2A1A" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <ellipse cx="160" cy="130" rx="76" ry="10"/>
    <path d="M84 130 v18 a76 76 0 0 0 76 70 a76 76 0 0 0 76 -70 v-18"/>
    <path d="M236 148 c22 0 30 16 30 32 c0 16 -10 30 -30 30"/>
    <ellipse cx="160" cy="232" rx="100" ry="9" fill="#3A2517" opacity="0.85" stroke="none"/>
  </g>

  <!-- liquid surface tint inside the cup -->
  <ellipse cx="160" cy="130" rx="74" ry="9" fill="#8C2A1A" opacity="0.18"/>

  <!-- teabag string: from inside the cup, over the rim, down to the tag -->
  <path d="M196 130 q12 -10 26 6 l8 30"
        fill="none" stroke="#3A2517" stroke-width="2" stroke-linecap="round"/>

  <!-- teabag tag — the wordmark lives here -->
  <g transform="translate(200 168)">
    <path d="M0 0 h78 l8 8 v32 h-86 z"
          fill="#FAF6EE" stroke="#8C2A1A" stroke-width="3" stroke-linejoin="round"/>
    <text x="43" y="26"
          font-family="ui-sans-serif, system-ui, 'IBM Plex Sans', sans-serif"
          font-weight="700" font-size="13"
          fill="#8C2A1A" text-anchor="middle"
          letter-spacing="0.03em">wayneblacktea</text>
  </g>
</svg>
