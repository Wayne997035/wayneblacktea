<?xml version="1.0" encoding="UTF-8"?>
<!--
  Placeholder logo for wayneblacktea. Implements the chosen direction
  in docs/logo-brief.md: a line-drawn teacup with a teabag tag dangling
  over the rim, the tag carrying the wordmark.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 320" width="360" height="320" role="img" aria-label="wayneblacktea (placeholder logo)">
  <title>wayneblacktea (placeholder)</title>

  <!-- background: paper -->
  <rect width="360" height="320" fill="#FAF6EE"/>

  <!-- ===== steam — three curly ribbons, layered for depth ===== -->
  <g fill="none" stroke="#8C2A1A" stroke-linecap="round" stroke-linejoin="round">
    <path d="M118 80 q-6 -14 6 -22 q14 -10 4 -24 q-8 -12 8 -22"
          stroke-width="4.5" opacity="0.95"/>
    <path d="M150 84 q8 -16 -4 -22 q-14 -8 0 -22 q14 -14 -2 -28"
          stroke-width="3.5" opacity="0.7"/>
    <path d="M180 78 q-8 -14 4 -22 q14 -8 0 -24"
          stroke-width="3" opacity="0.5"/>
  </g>

  <!-- ===== teacup body (single-stroke geometry, deep red) ===== -->
  <g fill="none" stroke="#8C2A1A" stroke-linecap="round" stroke-linejoin="round">
    <!-- rim (ellipse) -->
    <ellipse cx="150" cy="135" rx="86" ry="11" stroke-width="6"/>
    <!-- body sides + bottom curve -->
    <path d="M64 135 v22 a86 80 0 0 0 172 0 v-22" stroke-width="6"/>
    <!-- handle -->
    <path d="M236 156 c26 0 36 18 36 34 c0 18 -12 32 -36 32" stroke-width="6"/>
    <!-- saucer -->
    <ellipse cx="150" cy="240" rx="116" ry="9" stroke="#3A2517" stroke-width="3" fill="#3A2517" opacity="0.85"/>
    <ellipse cx="150" cy="240" rx="116" ry="9" stroke-width="3"/>
  </g>

  <!-- liquid surface (subtle red wash + a hairline glint) -->
  <ellipse cx="150" cy="135" rx="84" ry="9.5" fill="#8C2A1A" opacity="0.22"/>
  <path d="M88 134 q60 -7 124 0" fill="none" stroke="#FAF6EE" stroke-width="1.4" opacity="0.6"/>

  <!-- a stray tea leaf floating on the surface, peeking past the rim -->
  <path d="M122 132 q6 -5 13 -2 q-2 7 -8 8 q-5 0 -5 -6 z" fill="#3A2517" opacity="0.75"/>

  <!-- ===== teabag string: rim → over edge → tag ===== -->
  <path d="M205 134 q14 -10 28 6 l10 36"
        fill="none" stroke="#3A2517" stroke-width="2.2" stroke-linecap="round"/>

  <!-- ===== tag (the wordmark lives here) ===== -->
  <g transform="translate(200 178)">
    <!-- paper rectangle, with one chamfered corner where the string clips on -->
    <path d="M0 0 h120 l10 10 v44 h-130 z"
          fill="#FAF6EE" stroke="#8C2A1A" stroke-width="3" stroke-linejoin="round"/>
    <!-- inner hairline border for the printed-paper feel -->
    <path d="M5 5 h113 l8 8 v36 h-121 z"
          fill="none" stroke="#8C2A1A" stroke-width="0.8" opacity="0.45"/>
    <!-- decorative double rule above the wordmark -->
    <line x1="14" y1="20" x2="116" y2="20" stroke="#8C2A1A" stroke-width="0.6" opacity="0.5"/>
    <line x1="14" y1="22.4" x2="116" y2="22.4" stroke="#8C2A1A" stroke-width="0.6" opacity="0.5"/>
    <!-- punch hole where the string meets the tag -->
    <circle cx="123" cy="6" r="3" fill="#FAF6EE" stroke="#8C2A1A" stroke-width="1.4"/>
    <!-- wordmark -->
    <text x="65" y="40"
          font-family="ui-sans-serif, system-ui, 'IBM Plex Sans', 'Helvetica Neue', sans-serif"
          font-weight="700" font-size="17"
          fill="#8C2A1A" text-anchor="middle"
          letter-spacing="0.04em">wayneblacktea</text>
  </g>
</svg>
